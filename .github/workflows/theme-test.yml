name: Qorntix Theme Test

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

jobs:
  run_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v1
        with:
          node-version: '12'

      - name: Theme Test
        uses: Wordpress/theme-review-action@trunk
        with:
          accessible-ready: true
          ui-debug: true